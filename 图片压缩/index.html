<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩 - 简单高效</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom styles for the Image Compression Tool */
        .image-item {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom scrollbar for better look */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Success/Error status colors */
        .status-pending { color: #64748b; }
        .status-processing { color: #3b82f6; }
        .status-success { color: #10b981; }
        .status-error { color: #ef4444; }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .max-w-6xl {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">
    <div class="max-w-3xl mx-auto px-4 py-12">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">图片压缩</h1>
            <p class="text-gray-500">自动压缩至 1MB 以内，拖入即刻开始</p>
        </header>

        <!-- Main Panel -->
        <div class="space-y-6">
            <!-- Upload Area -->
            <div id="dropZone" class="bg-white border-2 border-dashed border-blue-200 rounded-3xl p-16 text-center hover:border-blue-500 hover:bg-blue-50 transition-all cursor-pointer group shadow-sm">
                <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
                <input type="file" id="folderInput" webkitdirectory class="hidden">
                <div class="flex flex-col items-center">
                    <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                        <i data-lucide="upload-cloud" class="w-10 h-10 text-blue-600"></i>
                    </div>
                    <p class="text-2xl font-bold text-gray-800 mb-2">拖入图片或文件夹</p>
                    <div class="flex gap-4">
                        <button onclick="document.getElementById('fileInput').click(); event.stopPropagation();" class="text-blue-600 hover:text-blue-700 font-semibold underline">选择文件</button>
                        <span class="text-gray-300">|</span>
                        <button onclick="document.getElementById('folderInput').click(); event.stopPropagation();" class="text-blue-600 hover:text-blue-700 font-semibold underline">选择文件夹</button>
                    </div>
                </div>
            </div>

            <!-- Global Status & Settings -->
            <div id="actionBar" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <div class="flex flex-col">
                        <span id="statsInfo" class="text-lg font-bold text-gray-800">已选择 0 张图片</span>
                        <button id="clearAllBtn" class="text-sm text-red-500 hover:text-red-600 font-medium text-left">清空列表</button>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200">
                            <span class="text-xs font-medium text-gray-500">目标:</span>
                            <select id="targetSize" class="bg-transparent text-sm font-bold focus:outline-none cursor-pointer">
                                <option value="1024" selected>1 MB</option>
                                <option value="819">800 KB</option>
                                <option value="512">500 KB</option>
                                <option value="2048">2 MB</option>
                            </select>
                        </div>
                        <div id="downloadOptions" class="hidden flex gap-2">
                            <button id="downloadAllBtn" class="bg-gray-100 text-gray-700 px-4 py-3 rounded-xl font-bold hover:bg-gray-200 transition-all flex items-center gap-2 text-sm" title="单张下载可能会弹出多个窗口">
                                <i data-lucide="files" class="w-4 h-4"></i>
                                批量单张下载
                            </button>
                            <button id="downloadZipBtn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 flex items-center gap-2">
                                <i data-lucide="archive" class="w-5 h-5"></i>
                                打包下载 ZIP
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Global Progress Bar -->
                <div id="globalProgress" class="hidden space-y-2">
                    <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden">
                        <div id="progressBar" class="bg-blue-600 h-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between text-xs font-medium text-gray-500">
                        <span id="progressLabel">正在处理...</span>
                        <span id="progressText">0%</span>
                    </div>
                </div>
            </div>

            <!-- Image List -->
            <div id="imageList" class="space-y-3"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-12 py-8 text-center text-gray-400 text-sm">
        <p>© 2026 亚马逊图片压缩 | 极简、快速、安全</p>
    </footer>

    <script>
        /**
         * 亚马逊图片压缩 - 极简优化版 (修复解压及单张下载)
         */

        // DOM 元素
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const folderInput = document.getElementById('folderInput');
        const imageList = document.getElementById('imageList');
        const actionBar = document.getElementById('actionBar');
        const statsInfo = document.getElementById('statsInfo');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const downloadOptions = document.getElementById('downloadOptions');
        const downloadZipBtn = document.getElementById('downloadZipBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const targetSizeSelect = document.getElementById('targetSize');
        const globalProgress = document.getElementById('globalProgress');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const progressLabel = document.getElementById('progressLabel');

        // 状态管理
        let filesToProcess = [];
        let isProcessing = false;

        // 初始化 Lucide 图标
        function refreshIcons() {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }

        // 交互逻辑
        dropZone.addEventListener('click', (e) => {
            if (e.target === dropZone || dropZone.contains(e.target)) {
                if (!e.target.closest('button')) {
                    fileInput.click();
                }
            }
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-blue-50');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = '';
        });

        folderInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            folderInput.value = '';
        });

        // 处理上传的文件
        function handleFiles(files) {
            const newFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            
            if (newFiles.length === 0) return;

            newFiles.forEach(file => {
                const fileId = Math.random().toString(36).substr(2, 9);
                const fileData = {
                    id: fileId,
                    file: file,
                    status: 'pending',
                    originalSize: file.size,
                    compressedSize: 0,
                    compressedBlob: null
                };
                filesToProcess.push(fileData);
                renderImageItem(fileData);
            });

            updateUI();
            if (!isProcessing) {
                startCompression();
            }
        }

        // 获取安全文件名
        function getSafeFileName(originalName, suffix = '_compressed') {
            const lastDotIndex = originalName.lastIndexOf('.');
            const namePart = lastDotIndex !== -1 ? originalName.substring(0, lastDotIndex) : originalName;
            const extPart = lastDotIndex !== -1 ? originalName.substring(lastDotIndex) : '';
            
            // 只保留字母、数字、中文、空格和连字符，彻底规避 Windows 安全限制
            const safeNamePart = namePart.replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s-_]/g, '');
            return `${safeNamePart}${suffix}${extPart}`;
        }

        // 渲染图片项
        function renderImageItem(fileData) {
            const item = document.createElement('div');
            item.id = `item-${fileData.id}`;
            item.className = 'image-item bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4';
            
            const sizeFormatted = (fileData.originalSize / 1024).toFixed(1) + ' KB';
            
            item.innerHTML = `
                <div class="w-14 h-14 bg-gray-50 rounded-xl flex-shrink-0 overflow-hidden border border-gray-100 cursor-pointer">
                    <img src="${URL.createObjectURL(fileData.file)}" class="w-full h-full object-cover">
                </div>
                <div class="flex-grow min-w-0">
                    <div class="flex items-center gap-2 mb-1">
                        <h3 class="font-bold text-gray-800 truncate text-sm" title="${fileData.file.name}">${fileData.file.name}</h3>
                        <span id="status-${fileData.id}" class="text-[10px] font-bold px-1.5 py-0.5 rounded uppercase bg-gray-100 text-gray-400">等待中</span>
                    </div>
                    <div class="flex items-center gap-3 text-xs text-gray-400">
                        <span>原始: ${sizeFormatted}</span>
                        <span id="compressed-info-${fileData.id}" class="hidden flex items-center gap-2">
                            <span class="text-gray-200">|</span>
                            压缩后: <span class="font-bold text-blue-600">0 KB</span> 
                            <span class="text-green-500 font-bold">(-0%)</span>
                        </span>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    <button id="download-single-${fileData.id}" class="hidden p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition-colors" title="下载此图">
                        <i data-lucide="download" class="w-5 h-5"></i>
                    </button>
                    <button id="remove-${fileData.id}" class="p-2 text-gray-300 hover:text-red-500 transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            `;

            imageList.insertBefore(item, imageList.firstChild);
            refreshIcons();

            item.querySelector('img').onclick = () => window.open(URL.createObjectURL(fileData.file), '_blank');
            item.querySelector(`#remove-${fileData.id}`).onclick = () => removeFile(fileData.id);
        }

        function removeFile(id) {
            filesToProcess = filesToProcess.filter(f => f.id !== id);
            const element = document.getElementById(`item-${id}`);
            if (element) element.remove();
            updateUI();
        }

        function updateUI() {
            const total = filesToProcess.length;
            if (total > 0) {
                actionBar.classList.remove('hidden');
                statsInfo.textContent = `已添加 ${total} 张图片`;
            } else {
                actionBar.classList.add('hidden');
                downloadOptions.classList.add('hidden');
                globalProgress.classList.add('hidden');
            }

            const allProcessed = filesToProcess.every(f => f.status === 'success' || f.status === 'error');
            if (total > 0 && allProcessed && filesToProcess.some(f => f.status === 'success')) {
                downloadOptions.classList.remove('hidden');
            } else {
                downloadOptions.classList.add('hidden');
            }
        }

        clearAllBtn.onclick = () => {
            filesToProcess = [];
            imageList.innerHTML = '';
            updateUI();
        };

        // 核心压缩逻辑
        async function startCompression() {
            if (isProcessing || filesToProcess.length === 0) return;

            const pendingFiles = filesToProcess.filter(f => f.status === 'pending');
            if (pendingFiles.length === 0) return;

            isProcessing = true;
            globalProgress.classList.remove('hidden');
            const targetSizeKB = parseInt(targetSizeSelect.value);
            
            let completedCount = filesToProcess.length - pendingFiles.length;
            const total = filesToProcess.length;
            const CONCURRENCY = 3;

            const queue = [...pendingFiles];
            const workers = [];

            const processFile = async (fileData) => {
                updateItemStatus(fileData.id, 'processing', '处理中');
                
                try {
                    const options = {
                        maxSizeMB: targetSizeKB / 1024,
                        maxWidthOrHeight: 2500,
                        useWebWorker: true,
                        initialQuality: 0.8,
                    };

                    const compressedBlob = await imageCompression(fileData.file, options);
                    
                    fileData.status = 'success';
                    fileData.compressedBlob = compressedBlob;
                    fileData.compressedSize = compressedBlob.size;
                    
                    updateItemSuccess(fileData);
                } catch (error) {
                    fileData.status = 'error';
                    updateItemStatus(fileData.id, 'error', '失败');
                }

                completedCount++;
                const percent = Math.round((completedCount / total) * 100);
                progressBar.style.width = `${percent}%`;
                progressText.textContent = `${percent}%`;
                progressLabel.textContent = `已处理 ${completedCount} / ${total}`;
            };

            for (let i = 0; i < Math.min(CONCURRENCY, queue.length); i++) {
                workers.push((async () => {
                    while (queue.length > 0) {
                        const item = queue.shift();
                        await processFile(item);
                    }
                })());
            }

            await Promise.all(workers);
            isProcessing = false;
            updateUI();
        }

        function updateItemStatus(id, status, text) {
            const statusEl = document.getElementById(`status-${id}`);
            if (!statusEl) return;
            statusEl.textContent = text;
            statusEl.className = `text-[10px] font-bold px-1.5 py-0.5 rounded uppercase ${
                status === 'processing' ? 'bg-blue-100 text-blue-600' : 
                status === 'error' ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-400'
            }`;
        }

        function updateItemSuccess(fileData) {
            const id = fileData.id;
            const statusEl = document.getElementById(`status-${id}`);
            if (statusEl) {
                statusEl.textContent = '完成';
                statusEl.className = 'text-[10px] font-bold px-1.5 py-0.5 rounded uppercase bg-green-100 text-green-600';
            }

            const infoEl = document.getElementById(`compressed-info-${id}`);
            const sizeKB = (fileData.compressedSize / 1024).toFixed(1);
            const ratio = Math.round((1 - fileData.compressedSize / fileData.originalSize) * 100);
            
            infoEl.classList.remove('hidden');
            infoEl.querySelector('.text-blue-600').textContent = `${sizeKB} KB`;
            infoEl.querySelector('.text-green-500').textContent = `(-${ratio}%)`;

            // 恢复单张下载按钮
            const singleDownloadBtn = document.getElementById(`download-single-${id}`);
            if (singleDownloadBtn) {
                singleDownloadBtn.classList.remove('hidden');
                singleDownloadBtn.onclick = () => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(fileData.compressedBlob);
                    link.download = getSafeFileName(fileData.file.name);
                    link.click();
                };
            }
            refreshIcons();
        }

        // 批量单张下载
        downloadAllBtn.onclick = async () => {
            const successFiles = filesToProcess.filter(f => f.status === 'success' && f.compressedBlob);
            if (successFiles.length === 0) return;

            if (successFiles.length > 5 && !confirm(`即将下载 ${successFiles.length} 张图片，浏览器可能会弹出多个下载窗口，是否继续？`)) {
                return;
            }

            downloadAllBtn.disabled = true;
            const originalContent = downloadAllBtn.innerHTML;
            
            for (let i = 0; i < successFiles.length; i++) {
                const fileData = successFiles[i];
                const link = document.createElement('a');
                link.href = URL.createObjectURL(fileData.compressedBlob);
                link.download = getSafeFileName(fileData.file.name);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                downloadAllBtn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> (${i + 1}/${successFiles.length})`;
                await new Promise(resolve => setTimeout(resolve, 600)); // 较长的间隔防止被浏览器拦截
            }

            downloadAllBtn.disabled = false;
            downloadAllBtn.innerHTML = originalContent;
            refreshIcons();
        };

        // 打包下载 ZIP - 深度修复解压空白问题
        downloadZipBtn.onclick = async () => {
            const successFiles = filesToProcess.filter(f => f.status === 'success' && f.compressedBlob);
            if (successFiles.length === 0) return;

            const originalBtnContent = downloadZipBtn.innerHTML;
            downloadZipBtn.disabled = true;
            downloadZipBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 打包中...`;
            refreshIcons();

            try {
                const zip = new JSZip();
                const usedNames = new Set();

                // 关键点：并行将所有 Blob 转换为 ArrayBuffer，提高 JSZip 兼容性
                const filePromises = successFiles.map(async (fileData) => {
                    const buffer = await fileData.compressedBlob.arrayBuffer();
                    let finalName = getSafeFileName(fileData.file.name);
                    
                    // 处理重名
                    let counter = 1;
                    const lastDotIndex = finalName.lastIndexOf('.');
                    const namePart = lastDotIndex !== -1 ? finalName.substring(0, lastDotIndex) : finalName;
                    const extPart = lastDotIndex !== -1 ? finalName.substring(lastDotIndex) : '';
                    
                    while (usedNames.has(finalName)) {
                        finalName = `${namePart}_${counter}${extPart}`;
                        counter++;
                    }
                    usedNames.add(finalName);
                    
                    // 使用 ArrayBuffer 写入，并显式设置日期
                    zip.file(finalName, buffer, {
                        date: new Date(),
                        binary: true
                    });
                });

                await Promise.all(filePromises);
                
                // 生成 ZIP，使用 STORE 模式 (不压缩) 往往能解决 Windows 自带解压程序的兼容性问题
                const content = await zip.generateAsync({
                    type: "blob",
                    compression: "STORE", 
                    mimeType: "application/zip"
                });

                const link = document.createElement('a');
                const url = URL.createObjectURL(content);
                link.href = url;
                link.download = `amazon_images_${new Date().getTime()}.zip`;
                document.body.appendChild(link);
                link.click();
                
                // 延迟清理，确保下载触发
                setTimeout(() => {
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 1000);

            } catch (error) {
                console.error('ZIP generation error:', error);
                alert('打包失败，请使用“批量单张下载”作为备选方案。');
            } finally {
                downloadZipBtn.disabled = false;
                downloadZipBtn.innerHTML = originalBtnContent;
                refreshIcons();
            }
        };

        // 初始化
        lucide.createIcons();
    </script>
</body>
</html>
